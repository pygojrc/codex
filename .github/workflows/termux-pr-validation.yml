name: Validate Termux release changes

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/termux-npm-build-publish.yml"
      - "codex-rs/**"
      - "scripts/fetch_rusty_v8_android.py"
      - "third_party/v8/**"
      - "verify-patches.sh"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt

      - name: Validate workflow, scripts, and security invariants
        shell: bash
        run: |
          set -o pipefail
          status=0
          {
            set -eux
            python3 - <<'PY'
          from pathlib import Path
          import yaml

          path = Path('.github/workflows/termux-npm-build-publish.yml')
          parsed = yaml.safe_load(path.read_text())
          if not isinstance(parsed, dict):
              raise SystemExit(f'{path} did not parse as a YAML mapping')
          print(f'validated YAML: {path}')
          PY
            bash -n verify-patches.sh
            CODEX_PUBLIC_SANITIZED_TREE=1 bash verify-patches.sh
            python3 -m py_compile scripts/fetch_rusty_v8_android.py
          } 2>&1 | tee termux-validation.log || status=$?
          exit "${status}"

      - name: Validate Rust formatting and locked workspace metadata
        shell: bash
        run: |
          set -o pipefail
          status=0
          {
            set -eux
            rustup run 1.95.0 cargo fmt --all -- --check
            cd codex-rs
            rustup run 1.95.0 cargo metadata --locked --no-deps --format-version 1 >/dev/null
          } 2>&1 | tee -a termux-validation.log || status=$?
          exit "${status}"

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: termux-validation-${{ github.run_id }}
          path: termux-validation.log
          if-no-files-found: warn
          retention-days: 7
