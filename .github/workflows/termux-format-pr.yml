name: Format Termux release PR

on:
  pull_request:
    types:
      - reopened
      - synchronize
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'security/harden-termux-v0.144.4'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HEAD_BRANCH: security/harden-termux-v0.144.4
    steps:
      - name: Checkout trusted same-repository branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: security/harden-termux-v0.144.4
          persist-credentials: true

      - name: Format Rust workspace
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          cd codex-rs
          rustup run 1.95.0 cargo fmt --all

      - name: Commit formatting only when needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-rs
          git commit -m "style: format hardened Termux changes"
          git push origin "HEAD:${HEAD_BRANCH}"
