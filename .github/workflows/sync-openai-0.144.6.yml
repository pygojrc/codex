name: Sync OpenAI Codex 0.144.6 v2

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: sync-openai-codex-0.144.6-v2
  cancel-in-progress: false

jobs:
  sync:
    if: >-
      github.repository == 'pygojrc/codex' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'sync-termux-v0.144.6'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    env:
      TARGET_BRANCH: sync-termux-v0.144.6
      OLD_UPSTREAM_COMMIT: 8c68d4c87dc54d38861f5114e920c3de2efa5876
      RELEASE_TAG: rust-v0.144.6
      RELEASE_COMMIT: 5d1fbf26c43abc65a203928b2e31561cb039e06d
    steps:
      - name: Checkout synchronization branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: sync-termux-v0.144.6
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch and merge fixed upstream release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/openai/codex.git
          git fetch --no-tags upstream "refs/tags/${RELEASE_TAG}"
          test "$(git rev-parse FETCH_HEAD)" = "${RELEASE_COMMIT}"
          git merge-base --is-ancestor "${OLD_UPSTREAM_COMMIT}" HEAD

          if git merge-base --is-ancestor "${RELEASE_COMMIT}" HEAD; then
            grep -q '^version = "0.144.6"$' codex-rs/Cargo.toml
            echo "OpenAI Codex 0.144.6 is already synchronized."
            exit 0
          fi

          set +e
          git merge --no-commit --no-ff "${RELEASE_COMMIT}"
          merge_status=$?
          set -e

          mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
          printf 'merge_status=%s\n' "${merge_status}"
          printf 'conflict=%s\n' "${conflicts[@]:-none}"

          if [ "${merge_status}" -ne 0 ]; then
            test "${#conflicts[@]}" -eq 1
            test "${conflicts[0]}" = "codex-rs/Cargo.toml"
            git checkout --ours codex-rs/Cargo.toml
          fi

          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('codex-rs/Cargo.toml')
          text = path.read_text()
          text, count = re.subn(
              r'(\[workspace\.package\]\nversion = )"(?:0\.144\.4|0\.0\.0)"',
              r'\1"0.144.6"',
              text,
              count=1,
          )
          if count != 1 and 'version = "0.144.6"' not in text:
              raise SystemExit('workspace version could not be resolved to 0.144.6')
          path.write_text(text)
          PY
          git add codex-rs/Cargo.toml

          test -z "$(git diff --name-only --diff-filter=U)"
          grep -q '^version = "0.144.6"$' codex-rs/Cargo.toml

          # Verify the two user-facing upstream fixes are present without
          # requiring Termux-specific files to be byte-identical to upstream.
          grep -q 'DangerousCommandMatch' codex-rs/core/src/exec_policy.rs
          grep -q 'ForcedRm' codex-rs/shell-command/src/command_safety/is_dangerous_command.rs
          test "$(grep -c '"'"'context_window"'"': 272000' codex-rs/models-manager/models.json)" -ge 3
          if git diff --quiet "${OLD_UPSTREAM_COMMIT}" -- codex-rs/models-manager/models.json; then
            echo "models.json did not receive the 0.144.6 metadata update" >&2
            exit 1
          fi

      - name: Update repository release metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          package_path = Path('npm-package/package.json')
          package = json.loads(package_path.read_text())
          if package.get('version') != '0.144.4':
              raise SystemExit(f"unexpected npm package version: {package.get('version')}")
          package['version'] = '0.144.6'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          readme = Path('README.md')
          text = readme.read_text()
          text = text.replace('rust-v0.144.4', 'rust-v0.144.6')
          text = text.replace('`0.144.4`', '`0.144.6`')
          readme.write_text(text)

          changelog = Path('CHANGELOG.md')
          old = changelog.read_text()
          heading = '# [0.144.6] - 2026-07-18\n'
          if heading not in old:
              changelog.write_text(
                  heading
                  + '\nSynced to OpenAI Codex `rust-v0.144.6`. This stable patch includes expanded dangerous-command detection and refreshed GPT-5.6 Sol, Terra, and Luna bundled instructions with corrected 272,000-token context windows. Reviewed Termux compatibility and release hardening remain applied.\n\n'
                  + old
              )
          PY
          rm -f .sync-0.144.6-trigger
          git add codex-rs/Cargo.toml npm-package/package.json README.md CHANGELOG.md
          git add -u .sync-0.144.6-trigger

      - name: Validate synchronized source
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.95.0 --profile minimal --component rustfmt
          CODEX_PUBLIC_SANITIZED_TREE=1 bash verify-patches.sh
          cd codex-rs
          rustup run 1.95.0 cargo fmt --all -- --check
          rustup run 1.95.0 cargo metadata --locked --no-deps --format-version 1 >/dev/null
          cd ..
          git diff --check

      - name: Commit and push synchronization
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "chore(release): sync OpenAI Codex 0.144.6"
          git merge-base --is-ancestor "${RELEASE_COMMIT}" HEAD
          git push origin "HEAD:${TARGET_BRANCH}"
