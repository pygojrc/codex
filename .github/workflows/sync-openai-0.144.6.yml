name: Sync OpenAI Codex 0.144.6 source

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: sync-openai-codex-0.144.6-source
  cancel-in-progress: true

jobs:
  sync:
    if: >-
      github.repository == 'pygojrc/codex' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'sync-termux-v0.144.6'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_BRANCH: sync-termux-v0.144.6
      DIAGNOSTIC_BRANCH: sync-diagnostic-v0.144.6
      UPSTREAM_BRANCH: upstream-rust-v0.144.6
      RELEASE_COMMIT: 5d1fbf26c43abc65a203928b2e31561cb039e06d
    steps:
      - name: Checkout Termux synchronization branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: sync-termux-v0.144.6
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "configured" > "${RUNNER_TEMP}/sync-checkpoint"

      - name: Merge fixed OpenAI stable release
        shell: bash
        run: |
          set -euo pipefail
          echo "fetching-pinned-upstream" > "${RUNNER_TEMP}/sync-checkpoint"
          git fetch origin "${UPSTREAM_BRANCH}:refs/remotes/origin/${UPSTREAM_BRANCH}"
          test "$(git rev-parse "origin/${UPSTREAM_BRANCH}")" = "${RELEASE_COMMIT}"

          if ! git merge-base --is-ancestor "${RELEASE_COMMIT}" HEAD; then
            echo "merging-upstream" > "${RUNNER_TEMP}/sync-checkpoint"
            set +e
            git merge --no-commit --no-ff "${RELEASE_COMMIT}"
            merge_status=$?
            set -e

            if [ "${merge_status}" -ne 0 ]; then
              echo "resolving-conflicts" > "${RUNNER_TEMP}/sync-checkpoint"
              while IFS= read -r conflict; do
                [ -n "${conflict}" ] || continue
                case "${conflict}" in
                  codex-rs/Cargo.toml)
                    git checkout --ours -- "${conflict}"
                    ;;
                  codex-rs/core/src/exec_policy.rs|\
                  codex-rs/core/src/exec_policy_tests.rs|\
                  codex-rs/core/tests/suite/exec_policy.rs|\
                  codex-rs/models-manager/models.json|\
                  codex-rs/shell-command/src/bash.rs|\
                  codex-rs/shell-command/src/command_safety/is_dangerous_command.rs)
                    git checkout --theirs -- "${conflict}"
                    ;;
                  *)
                    echo "unexpected merge conflict: ${conflict}" >&2
                    exit 1
                    ;;
                esac
                git add -- "${conflict}"
              done < <(git diff --name-only --diff-filter=U)
            fi
          fi

          echo "resolving-version" > "${RUNNER_TEMP}/sync-checkpoint"
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path("codex-rs/Cargo.toml")
          text = path.read_text()
          text, count = re.subn(
              r'(\[workspace\.package\]\nversion = )"(?:0\.144\.4|0\.0\.0)"',
              r'\1"0.144.6"',
              text,
              count=1,
          )
          if count != 1 and 'version = "0.144.6"' not in text:
              raise SystemExit("unable to resolve workspace version")
          path.write_text(text)
          PY
          git add codex-rs/Cargo.toml
          test -z "$(git diff --name-only --diff-filter=U)"

      - name: Verify synchronized upstream content
        shell: bash
        run: |
          set -euo pipefail
          echo "verifying-upstream-content" > "${RUNNER_TEMP}/sync-checkpoint"
          grep -q '^version = "0.144.6"$' codex-rs/Cargo.toml
          grep -q 'DangerousCommandMatch' codex-rs/core/src/exec_policy.rs
          grep -q 'ForcedRm' codex-rs/shell-command/src/command_safety/is_dangerous_command.rs
          python3 - <<'PY'
          import json
          from pathlib import Path

          models = json.loads(Path("codex-rs/models-manager/models.json").read_text())["models"]
          wanted = {"gpt-5.6-sol", "gpt-5.6-terra", "gpt-5.6-luna"}
          found = {m["slug"]: m for m in models if m.get("slug") in wanted}
          if set(found) != wanted:
              raise SystemExit(f"missing GPT-5.6 model metadata: {wanted - set(found)}")
          for slug, model in found.items():
              if model.get("context_window") != 272000 or model.get("max_context_window") != 272000:
                  raise SystemExit(f"unexpected context window for {slug}")
          PY

      - name: Update repository version metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "updating-repository-metadata" > "${RUNNER_TEMP}/sync-checkpoint"
          python3 - <<'PY'
          import json
          from pathlib import Path

          package_path = Path("npm-package/package.json")
          package = json.loads(package_path.read_text())
          if package.get("version") not in {"0.144.4", "0.144.6"}:
              raise SystemExit(f"unexpected package version: {package.get('version')}")
          package["version"] = "0.144.6"
          package_path.write_text(json.dumps(package, indent=2) + "\n")

          readme = Path("README.md")
          readme_text = readme.read_text()
          readme_text = readme_text.replace("rust-v0.144.4", "rust-v0.144.6")
          readme_text = readme_text.replace("`0.144.4`", "`0.144.6`")
          readme.write_text(readme_text)

          changelog = Path("CHANGELOG.md")
          old = changelog.read_text()
          heading = "# [0.144.6] - 2026-07-18\n"
          if heading not in old:
              changelog.write_text(
                  heading
                  + "\nSynced to OpenAI Codex `rust-v0.144.6`. Includes expanded dangerous-command detection and refreshed GPT-5.6 Sol, Terra, and Luna instructions with corrected 272,000-token context windows. Termux compatibility patches are validated in the following patch-review commit.\n\n"
                  + old
              )
          PY

          git rm -f --ignore-unmatch \
            .sync-0.144.6-trigger \
            .sync-0.144.6-x64-v2-trigger \
            .sync-0.144.6-macos-trigger \
            .sync-0.144.6-arm-v4-trigger \
            .sync-0.144.6-arm-v5-trigger \
            .sync-0.144.6-source-trigger
          git add codex-rs/Cargo.toml npm-package/package.json README.md CHANGELOG.md

      - name: Validate locked workspace metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "validating-cargo-metadata" > "${RUNNER_TEMP}/sync-checkpoint"
          rustup toolchain install 1.95.0 --profile minimal
          cd codex-rs
          rustup run 1.95.0 cargo metadata --locked --no-deps --format-version 1 >/dev/null
          cd ..
          git diff --check

      - name: Commit and push synchronized source
        shell: bash
        run: |
          set -euo pipefail
          echo "committing-source-sync" > "${RUNNER_TEMP}/sync-checkpoint"
          git commit -m "chore(release): sync OpenAI Codex 0.144.6"
          git merge-base --is-ancestor "${RELEASE_COMMIT}" HEAD
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "pushed-source-sync" > "${RUNNER_TEMP}/sync-checkpoint"

      - name: Publish failure diagnostic
        if: failure()
        shell: bash
        run: |
          set +e
          checkpoint="$(cat "${RUNNER_TEMP}/sync-checkpoint" 2>/dev/null)"
          status="$(git status --porcelain=v1 2>&1)"
          conflicts="$(git diff --name-only --diff-filter=U 2>&1)"
          head_sha="$(git rev-parse HEAD 2>&1)"
          git merge --abort >/dev/null 2>&1 || true
          git fetch origin "${TARGET_BRANCH}"
          git checkout -B "${DIAGNOSTIC_BRANCH}" "origin/${TARGET_BRANCH}"
          printf 'checkpoint=%s\nhead=%s\nconflicts:\n%s\nstatus:\n%s\n' \
            "${checkpoint}" "${head_sha}" "${conflicts}" "${status}" \
            > .sync-diagnostic-0.144.6.txt
          git add .sync-diagnostic-0.144.6.txt
          git commit -m "ci: record Codex 0.144.6 sync failure"
          git push --force origin "HEAD:${DIAGNOSTIC_BRANCH}"
