name: Refresh Termux 0.144.6 Cargo lock

on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  refresh-lock:
    if: >-
      github.repository == 'pygojrc/codex' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'refresh-lock-termux-v0.144.6'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout lock refresh branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refresh-lock-termux-v0.144.6
          fetch-depth: 0
          persist-credentials: true

      - name: Refresh lock file
        shell: bash
        run: |
          set -euo pipefail
          grep -q '^version = "0.144.6"$' codex-rs/Cargo.toml
          cp codex-rs/Cargo.lock "${RUNNER_TEMP}/Cargo.lock.before"
          rustup toolchain install 1.95.0 --profile minimal
          cd codex-rs
          rustup run 1.95.0 cargo metadata --format-version 1 >/dev/null
          cd ..

      - name: Audit lock-file delta
        shell: bash
        run: |
          set -euo pipefail
          BEFORE_LOCK="${RUNNER_TEMP}/Cargo.lock.before" python3 - <<'PY'
          from collections import Counter
          from pathlib import Path
          import difflib
          import os

          before = Path(os.environ['BEFORE_LOCK']).read_text().splitlines()
          after = Path('codex-rs/Cargo.lock').read_text().splitlines()
          changed = [
              line for line in difflib.ndiff(before, after)
              if line.startswith('- ') or line.startswith('+ ')
          ]
          if not changed:
              raise SystemExit('Cargo.lock did not change')

          removed = []
          added = []
          for line in changed:
              body = line[2:]
              if line.startswith('- '):
                  if '0.144.4' not in body or '0.144.6' in body:
                      raise SystemExit(f'unexpected removed lock line: {body}')
                  removed.append(body)
              else:
                  if '0.144.6' not in body or '0.144.4' in body:
                      raise SystemExit(f'unexpected added lock line: {body}')
                  added.append(body.replace('0.144.6', '0.144.4'))

          if Counter(removed) != Counter(added):
              raise SystemExit('lock delta is not a pure 0.144.4 to 0.144.6 replacement')

          print(f'validated {len(removed)} lock-file version replacements')
          PY
          cd codex-rs
          rustup run 1.95.0 cargo metadata --locked --format-version 1 >/dev/null
          cd ..
          git diff --check -- codex-rs/Cargo.lock

      - name: Commit audited lock file
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -f .refresh-lock-termux-v0.144.6
          git add codex-rs/Cargo.lock
          git add -u .refresh-lock-termux-v0.144.6
          git commit -m 'chore(release): refresh Cargo.lock for 0.144.6'
          git push origin HEAD:refresh-lock-termux-v0.144.6
