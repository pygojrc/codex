name: release-cx

on:
  push:
    branches:
      - cx_dev
    paths:
      - ".github/workflows/release-cx.trigger"
    tags:
      - "cx-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-cx-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build cx-linux-x86_64-gnu
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake libssl-dev perl pkg-config zstd

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.95.0 --profile minimal --target x86_64-unknown-linux-gnu
          rustc +1.95.0 -V
          cargo +1.95.0 -V

      - name: Build
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          set -euo pipefail
          cargo +1.95.0 build --release --locked --target x86_64-unknown-linux-gnu --bin codex
          mkdir -p dist/cx-linux-x86_64-gnu
          cp target/x86_64-unknown-linux-gnu/release/codex dist/cx-linux-x86_64-gnu/cx
          chmod 0755 dist/cx-linux-x86_64-gnu/cx

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tar -C dist/cx-linux-x86_64-gnu -czf dist/cx-linux-x86_64-gnu.tar.gz cx
          sha256sum dist/cx-linux-x86_64-gnu.tar.gz > dist/cx-linux-x86_64-gnu.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cx-linux-x86_64-gnu
          path: |
            codex-rs/dist/cx-linux-x86_64-gnu.tar.gz
            codex-rs/dist/cx-linux-x86_64-gnu.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('cx-dev-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('cx dev build {0}', github.run_number) }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
