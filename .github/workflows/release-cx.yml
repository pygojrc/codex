name: release-cx

on:
  push:
    branches:
      - cx_dev
    paths:
      - ".github/workflows/release-cx.trigger"
    tags:
      - "cx-v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-cx-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    defaults:
      run:
        working-directory: codex-rs

    strategy:
      fail-fast: false
      matrix:
        include:
          # 阶段 1：Ubuntu x86_64 GNU
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            package: cx-linux-x86_64-gnu
            libc: gnu

          # 阶段 2：Linux aarch64 GNU
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            package: cx-linux-aarch64-gnu
            libc: gnu

          # 阶段 3：musl 静态包
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            package: cx-linux-x86_64-musl
            libc: musl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            package: cx-linux-aarch64-musl
            libc: musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            binutils \
            cmake \
            libcap-dev \
            libssl-dev \
            perl \
            pkg-config \
            zstd

          if [[ "${{ matrix.libc }}" == "musl" ]]; then
            sudo apt-get install -y --no-install-recommends musl-tools
          fi

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.95.0 --profile minimal --target "${{ matrix.target }}"
          rustup default 1.95.0
          rustup show
          rustc -V
          cargo -V

      - name: Build codex and rename to cx
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          AWS_LC_SYS_NO_JITTER_ENTROPY: "1"
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          set -euo pipefail
          cargo +1.95.0 build --release --locked --target "${{ matrix.target }}" --bin codex

          mkdir -p "dist/${{ matrix.package }}"
          cp "target/${{ matrix.target }}/release/codex" "dist/${{ matrix.package }}/cx"
          chmod 0755 "dist/${{ matrix.package }}/cx"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tar -C "dist/${{ matrix.package }}" -czf "dist/${{ matrix.package }}.tar.gz" cx
          sha256sum "dist/${{ matrix.package }}.tar.gz" > "dist/${{ matrix.package }}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: |
            codex-rs/dist/${{ matrix.package }}.tar.gz
            codex-rs/dist/${{ matrix.package }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('cx-dev-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('cx dev build {0}', github.run_number) }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
