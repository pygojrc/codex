name: Cancel duplicate Termux release run

on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  cancel-duplicate:
    if: >-
      github.repository == 'pygojrc/codex' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'inspect-termux-run-29804166646'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Cancel duplicate pending release run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: '29804166646'
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST "repos/${REPOSITORY}/actions/runs/${RUN_ID}/cancel"
