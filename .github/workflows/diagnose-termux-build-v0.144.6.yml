name: Diagnose Termux 0.144.6 build failure

on:
  pull_request:
    types: [opened, reopened]
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    if: >-
      github.repository == 'pygojrc/codex' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'diagnose-termux-v0.144.6'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: diagnose-termux-v0.144.6
          persist-credentials: true

      - name: Capture failed ARM64 build log tail
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          FAILED_JOB_ID: '88406581090'
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" > full-build.log
          tail -n 220 full-build.log > .termux-build-error-v0.144.6.txt
          rm full-build.log

      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .termux-build-error-v0.144.6.txt
          git commit -m 'ci: capture Termux 0.144.6 build failure'
          git push origin HEAD:diagnose-termux-v0.144.6
